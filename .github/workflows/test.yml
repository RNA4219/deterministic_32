name: test
on:
  push: { branches: ["**"] }
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TZ: UTC
  LANG: C.UTF-8

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - name: ESLint (if exists)
        run: |
          if [ -f package.json ] && node -e "p=require('./package.json');process.exit(!(p.scripts&&p.scripts.lint))"; then
            npm ci
            npm run -s lint
          fi

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22.x"
      - run: node -v
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Prettier check
        run: npx --yes prettier@3.3.3 --check .
      - name: Run lint
        run: npm run lint
      - name: Build
        run: |
          rm -rf dist
          npm run build
          if [ ! -d dist ]; then
            echo "dist/ directory was not created by build" >&2
            exit 1
          fi
      - name: Check bundle size
        run: npm run size
      - name: Security audit
        run: |
          set +e
          output="$(npm audit --audit-level=moderate 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$output"
          if [ "$status" -ne 0 ]; then
            if printf '%s\n' "$output" | grep -qiE 'service unavailable'; then
              echo "npm audit skipped: registry responded with Service Unavailable (503)." >&2
            else
              exit "$status"
            fi
          fi

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - name: Node unit (repo root)
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          npm ci
          npm test --silent -- --maxWorkers=2
      - name: Node unit (frontend/)
        if: ${{ hashFiles('frontend/package.json') != '' }}
        working-directory: frontend
        run: |
          npm ci
          npm test --silent -- --maxWorkers=2
      - name: Node unit (packages/*)
        if: ${{ hashFiles('packages/*/package.json') != '' }}
        run: |
          shopt -s nullglob
          for PKG in packages/*; do
            if [ -f "$PKG/package.json" ]; then
              pushd "$PKG" >/dev/null
              npm ci
              npm test --silent -- --maxWorkers=2
              popd >/dev/null
            fi
          done
          shopt -u nullglob
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Pytest (repo root)
        if: ${{ hashFiles('pyproject.toml') != '' || hashFiles('requirements*.txt') != '' || hashFiles('requirements/*.txt') != '' }}
        run: |
          pip install -U pip wheel || true
          pip install -r requirements.txt 2>/dev/null || true
          pip install -r requirements/dev.txt 2>/dev/null || true
          pip install pytest || true
          pytest -q
      - name: Pytest (backend/)
        if: ${{ hashFiles('backend/pyproject.toml') != '' || hashFiles('backend/requirements*.txt') != '' }}
        working-directory: backend
        run: |
          pip install -U pip wheel || true
          pip install -r requirements.txt 2>/dev/null || true
          pip install -r requirements/dev.txt 2>/dev/null || true
          pip install pytest || true
          pytest -q

  build:
    needs: [lint, typecheck, unit]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - run: mkdir -p dist
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: '**/package-lock.json'
      - name: Build (if exists)
        run: |
          if [ -f package.json ] && node -e "p=require('./package.json');process.exit(!(p.scripts&&p.scripts.build))"; then
            npm ci
            npm run -s build
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-output
          path: dist/**
          if-no-files-found: ignore

  e2e:
    needs: [build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: Playwright E2E (if exists)
        run: |
          if [ -f package.json ] && node -e "p=require('./package.json');process.exit(!(p.scripts&&p.scripts['test:e2e']))"; then
            echo "No test:e2e script; skipping."
          else
            npm ci
            npx playwright install --with-deps
            npm run -s test:e2e
          fi